[fonts.defaults]
default = "Times New Roman"
zh = "宋体"
en = "Times New Roman"

[fonts.families]
# 推荐把 Windows 常见字体放到项目根 fonts/windows/ 目录，供 MTC / MTT 共用。
# 品牌宋 = "fonts/custom/my-brand-serif.ttf"
# 品牌黑 = "fonts/custom/my-brand-sans.ttf"
# 小标宋 = "fonts/custom/方正小标宋.ttf"

[styles.heading]
font-family = "微软雅黑"
font = 54
color = "#f8fafc"
weight = 700
letter-spacing = 3
align = "center"
language = "en"

[styles.body]
font = 28
color = "#cbd5e1"
line-height = 1.35
align = "left"
language = "zh"

[styles.note]
font-family = "Times New Roman"
font = 24
color = "#f8fafc"
line-height = 1.3
letter-spacing = 1
align = "right"
